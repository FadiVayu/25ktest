apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
      - name: app
        image: 25ktest:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
        - name: MODE
          value: events
        - name: MONGO_URI
          value: mongodb://mongo-headless:27017
        - name: KAFKA_BROKERS
          value: '["redpanda:19092"]'
        - name: REDIS_URI
          value: redis://redis:6379
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  ports:
    - port: 3000
  selector:
    app: app
